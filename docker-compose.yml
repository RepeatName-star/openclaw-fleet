services:
  postgres:
    image: postgres:16
    container_name: openclaw-fleet-postgres
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw
      POSTGRES_DB: openclaw_fleet
    ports:
      - "5432:5432"
    volumes:
      - openclaw_fleet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw -d openclaw_fleet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: openclaw-fleet-redis
    ports:
      - "6379:6379"
    volumes:
      - openclaw_fleet_redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  openclaw_fleet_pgdata:
  openclaw_fleet_redisdata:
